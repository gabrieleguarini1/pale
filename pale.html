<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Gym App - Slim & Edit</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --group-bg-1: #151515;
            --group-bg-2: #1e1e1e; /* Simula l'alternanza giallo/bianco */
            --primary: #00e676;
            --text-main: #f0f0f0;
            --text-muted: #888888;
            --danger: #ff5252;
            --border-color: #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 100px;
            font-size: 14px; /* Font più piccolo per design slim */
        }

        header {
            background-color: var(--group-bg-1);
            padding: 10px 15px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid var(--border-color);
        }

        h1 {
            font-size: 1.2rem;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 5px;
        }

        .tab-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 6px 15px;
            border-radius: 15px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .tab-btn.active {
            background-color: var(--primary);
            color: var(--bg-color);
            border-color: var(--primary);
            font-weight: bold;
        }

        .container {
            padding: 10px;
            max-width: 600px;
            margin: 0 auto;
        }

        .day-content { display: none; }
        .day-content.active { display: block; animation: fade 0.2s; }

        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

        /* Stile dei Gruppi (Superserie/Triserie) */
        .exercise-group {
            border-radius: 8px;
            margin-bottom: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--text-muted);
        }

        /* Alternanza colori per i gruppi */
        .exercise-group:nth-child(odd) { background-color: var(--group-bg-1); }
        .exercise-group:nth-child(even) { background-color: var(--group-bg-2); }

        .group-header {
            font-size: 0.7rem;
            text-transform: uppercase;
            padding: 2px 8px;
            background: rgba(0,0,0,0.3);
            color: var(--text-muted);
            text-align: right;
            border-bottom: 1px solid var(--border-color);
        }

        .exercise-item {
            display: flex;
            align-items: center;
            padding: 8px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: opacity 0.3s;
        }
        .exercise-item:last-child { border-bottom: none; }

        .exercise-item.done { opacity: 0.4; }
        .exercise-item.done .ex-name { text-decoration: line-through; }

        /* Custom Checkbox Piccola */
        .checkbox-wrapper { margin-right: 10px; }
        .checkbox-wrapper input { display: none; }
        .checkbox-wrapper label {
            width: 20px; height: 20px;
            border: 2px solid var(--text-muted);
            border-radius: 4px;
            display: inline-block;
            cursor: pointer;
            position: relative;
        }
        .checkbox-wrapper input:checked + label {
            background-color: var(--primary);
            border-color: var(--primary);
        }
        .checkbox-wrapper input:checked + label::after {
            content: '✓'; position: absolute;
            color: var(--bg-color); font-weight: bold;
            font-size: 14px; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        .ex-info {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .ex-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ex-name {
            font-weight: 600;
            font-size: 1rem;
            color: #fff;
        }

        .ex-stats {
            display: flex;
            gap: 8px;
            font-size: 0.85rem;
        }

        /* Stile campi modificabili */
        [contenteditable="true"] {
            border-bottom: 1px dashed var(--text-muted);
            outline: none;
            min-width: 15px;
            display: inline-block;
            transition: all 0.2s;
        }

        [contenteditable="true"]:focus {
            border-bottom-color: var(--primary);
            color: var(--primary);
            background: rgba(0, 230, 118, 0.1);
            border-radius: 2px;
        }

        /* Timer in basso ridotto */
        .timer-container {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background-color: var(--group-bg-1);
            padding: 10px;
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
        }

        .timer-display {
            font-size: 1.8rem;
            font-weight: bold;
            font-variant-numeric: tabular-nums;
            width: 80px;
            text-align: center;
        }

        .timer-display.finished { color: var(--danger); animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .timer-controls {
            display: flex;
            gap: 6px;
            flex-grow: 1;
            justify-content: flex-end;
        }

        .timer-btn {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            background-color: #333;
            color: white;
        }
        .timer-btn.preset { background-color: #2c3e50; }
        .timer-btn.stop { background-color: var(--danger); }
        
    </style>
</head>
<body>

    <header>
        <h1>Workout Slim</h1>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('day1')">DAY 1</button>
            <button class="tab-btn" onclick="switchTab('day2')">DAY 2</button>
            <button class="tab-btn" onclick="resetData()" style="border-color: #ff5252; color: #ff5252;">Reset Dati</button>
        </div>
    </header>

    <div class="container">
        <div id="day1" class="day-content active"></div>
        <div id="day2" class="day-content"></div>
    </div>

    <div class="timer-container">
        <div class="timer-display" id="timeDisplay">00:00</div>
        <div class="timer-controls">
            <button class="timer-btn preset" onclick="startTimer(30)">30s</button>
            <button class="timer-btn preset" onclick="startTimer(60)">60s</button>
            <button class="timer-btn preset" onclick="startTimer(90)">90s</button>
            <button class="timer-btn stop" onclick="stopTimer()">STOP</button>
        </div>
    </div>

    <audio id="beepSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script>
        // Struttura dati raggruppata per serie (Multiserie/Triserie) basata sui blocchi di colore
        const defaultData = {
            day1: [
                [{ id: "d1_0", name: "Corsa", reps: "5 Min", weight: "-" }],
                [
                    { id: "d1_1", name: "Plank Piedi Pallone 30SEC", reps: "30 SEC", weight: "-" },
                    { id: "d1_2", name: "Plank Laterale", reps: "20", weight: "-" }
                ],
                [
                    { id: "d1_3", name: "Polpacci 30SEC", reps: "30", weight: "16" },
                    { id: "d1_4", name: "Lento Avanti", reps: "12", weight: "16" },
                    { id: "d1_5", name: "Crunch Gambe Su", reps: "20", weight: "-" }
                ],
                [
                    { id: "d1_6", name: "Squat 30SEC", reps: "12", weight: "55" },
                    { id: "d1_7", name: "Bicipiti", reps: "10", weight: "10" },
                    { id: "d1_8", name: "Croci Busto Flesso", reps: "12", weight: "8" }
                ],
                [
                    { id: "d1_9", name: "Trazioni Strette", reps: "8", weight: "-" },
                    { id: "d1_10", name: "Trici Busto Flesso", reps: "12", weight: "6" },
                    { id: "d1_11", name: "Affondi Avanti", reps: "8", weight: "10" }
                ],
                [
                    { id: "d1_12", name: "Panca Piana", reps: "10", weight: "50" },
                    { id: "d1_13", name: "Crunch Panca", reps: "20", weight: "-" },
                    { id: "d1_14", name: "Sumo Squat", reps: "30SEC", weight: "24" }
                ],
                [
                    { id: "d1_15", name: "Stretc Gamba Flessa", reps: "30 SEC", weight: "-" },
                    { id: "d1_16", name: "Lombare Supino", reps: "30 SEC", weight: "-" },
                    { id: "d1_17", name: "Quadricipiti", reps: "30 SEC", weight: "-" }
                ]
            ],
            day2: [
                [{ id: "d2_0", name: "Corsa", reps: "5 Min", weight: "-" }],
                [
                    { id: "d2_1", name: "Plank Braccia Pallone 30SEC", reps: "30 SEC", weight: "-" },
                    { id: "d2_2", name: "Plank Laterale", reps: "20", weight: "-" }
                ],
                [
                    { id: "d2_3", name: "Bulgaro Su Panca", reps: "10", weight: "10" },
                    { id: "d2_4", name: "Alzate Laterali Seduto", reps: "12", weight: "10" },
                    { id: "d2_5", name: "Chrunch Tocca Tacco", reps: "15", weight: "-" }
                ],
                [
                    { id: "d2_6", name: "Rematore Triangolo", reps: "10", weight: "50" },
                    { id: "d2_7", name: "Affondo Laterale", reps: "10", weight: "10" },
                    { id: "d2_8", name: "Trazione Larga", reps: "10", weight: "25" }
                ],
                [
                    { id: "d2_9", name: "Swing", reps: "15", weight: "20" },
                    { id: "d2_10", name: "Strech In Piedi", reps: "30 SEC", weight: "-" }
                ],
                [
                    { id: "d2_11", name: "Distensioni Petto Inclinato 90 SEC", reps: "10", weight: "20" },
                    { id: "d2_12", name: "Croci Petto Inclinato", reps: "12", weight: "10" }
                ],
                [
                    { id: "d2_13", name: "Bicipiti 30 SEC", reps: "10", weight: "10" },
                    { id: "d2_14", name: "Tricipiti Manubrio Dietro", reps: "10", weight: "18" },
                    { id: "d2_15", name: "Pedalata", reps: "20", weight: "-" }
                ],
                [
                    { id: "d2_16", name: "Stretc Gamba Flessa", reps: "30 SEC", weight: "-" },
                    { id: "d2_17", name: "Lombare Supino", reps: "30 SEC", weight: "-" },
                    { id: "d2_18", name: "Quadricipiti", reps: "30 SEC", weight: "-" }
                ]
            ]
        };

        // Carica dati da LocalStorage o usa i default
        let appData = JSON.parse(localStorage.getItem('gymData')) || defaultData;

        function saveDati() {
            localStorage.setItem('gymData', JSON.stringify(appData));
        }

        function resetData() {
            if(confirm("Vuoi ripristinare i nomi e i pesi originali?")) {
                localStorage.removeItem('gymData');
                location.reload();
            }
        }

        // Funzione per aggiornare l'array quando si modifica un testo
        function updateField(dayId, groupIndex, exIndex, field, element) {
            appData[dayId][groupIndex][exIndex][field] = element.innerText;
            saveDati();
        }

        // Render dell'HTML
        function renderDay(dayId, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';

            appData[dayId].forEach((group, gIndex) => {
                let groupHtml = `<div class="exercise-group">`;
                
                // Etichetta del gruppo se > 1 esercizio
                if(group.length > 1) {
                    const groupType = group.length === 2 ? 'Superserie' : (group.length === 3 ? 'Triserie' : 'Circuito');
                    groupHtml += `<div class="group-header">${groupType}</div>`;
                }

                group.forEach((ex, eIndex) => {
                    groupHtml += `
                        <div class="exercise-item" id="item-${ex.id}">
                            <div class="checkbox-wrapper">
                                <input type="checkbox" id="chk-${ex.id}" onchange="toggleDone('item-${ex.id}')">
                                <label for="chk-${ex.id}"></label>
                            </div>
                            <div class="ex-info">
                                <div class="ex-name" contenteditable="true" onblur="updateField('${dayId}', ${gIndex}, ${eIndex}, 'name', this)">${ex.name}</div>
                                <div class="ex-stats">
                                    <span>Rip: <span contenteditable="true" onblur="updateField('${dayId}', ${gIndex}, ${eIndex}, 'reps', this)">${ex.reps}</span></span>
                                    <span>Kg: <span contenteditable="true" onblur="updateField('${dayId}', ${gIndex}, ${eIndex}, 'weight', this)">${ex.weight}</span></span>
                                </div>
                            </div>
                        </div>
                    `;
                });

                groupHtml += `</div>`;
                container.innerHTML += groupHtml;
            });
        }

        renderDay('day1', 'day1');
        renderDay('day2', 'day2');

        // Gestione Tab
        function switchTab(tabId) {
            document.querySelectorAll('.day-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }

        // Segno di spunta
        function toggleDone(itemId) {
            document.getElementById(itemId).classList.toggle('done');
        }

        // Timer
        let timerInterval;
        let timeLeft = 0;
        const display = document.getElementById('timeDisplay');
        const beepSound = document.getElementById('beepSound');

        function updateDisplay(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            display.innerText = `${m}:${s}`;
        }

        function startTimer(seconds) {
            clearInterval(timerInterval);
            display.classList.remove('finished');
            timeLeft = seconds;
            updateDisplay(timeLeft);
            
            timerInterval = setInterval(() => {
                timeLeft--;
                updateDisplay(timeLeft);
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    display.classList.add('finished');
                    display.innerText = "FINE";
                    beepSound.play().catch(e => console.log("Audio bloccato dal browser"));
                }
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            timeLeft = 0;
            updateDisplay(0);
            display.classList.remove('finished');
        }
    </script>
</body>
</html>
